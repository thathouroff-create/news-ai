<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="theme-color" content="#000000">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="News AI">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3615/3615127.png">

    <title>Global News AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* БЛОКИРОВКА UI GOOGLE */
        #goog-gt-tt, .goog-te-balloon-frame, .goog-te-banner-frame, .goog-te-menu-frame, .goog-te-gadget-icon, .skiptranslate, .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { 
            display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; 
        }
        body { top: 0 !important; position: relative !important; margin: 0 !important; padding: 0 !important; }
        html { margin-top: 0 !important; }

        :root {
            --bg-color: #f4f6f8; --text-color: #1d1d1f; --text-muted: #86868b;
            --card-bg: #ffffff; --header-bg: #ffffff; --accent-color: #0066cc;
            --border-color: #d2d2d7; --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --ai-bg: rgba(0, 102, 204, 0.08); --modal-bg: rgba(0,0,0,0.4);
        }

        body.dark-mode {
            --bg-color: #000000; --text-color: #f5f5f7; --text-muted: #86868b;
            --card-bg: #1c1c1e; --header-bg: #1c1c1e; --accent-color: #2997ff;
            --border-color: #38383a; --shadow: 0 4px 12px rgba(0,0,0,0.5);
            --ai-bg: rgba(41, 151, 255, 0.12); --modal-bg: rgba(0,0,0,0.8);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; -webkit-tap-highlight-color: transparent; }

        /* --- КОМПАКТНАЯ ШАПКА --- */
        header { background-color: var(--header-bg); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding-top: env(safe-area-inset-top); }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; max-width: 1200px; margin: 0 auto; }
        .logo { margin: 0; font-size: 1.5rem; font-weight: 900; color: var(--accent-color); letter-spacing: -1.5px; }
        
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .currency-block { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; 
            cursor: pointer; box-shadow: var(--shadow); white-space: nowrap;
        }
        .header-btns { display: flex; gap: 6px; }
        .icon-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .icon-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* --- ТАБЫ 3 + 2 --- */
        .tabs-container { width: 100%; border-top: 1px solid var(--border-color); padding: 10px 0; background-color: var(--header-bg); }
        .tabs { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .tabs-row { display: flex; gap: 8px; justify-content: center; }

        .tab-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .container { max-width: 800px; margin: 12px auto; padding: 0 12px; }
        .news-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 18px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .news-card.top-story { border: 2px solid var(--accent-color); }
        .news-source { display: inline-block; background: rgba(128, 128, 128, 0.1); color: var(--text-color); padding: 2px 6px; border-radius: 5px; font-size: 0.65rem; font-weight: 800; margin-bottom: 6px; align-self: flex-start; }
        .news-date { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; }
        .news-title { font-size: 1.05rem; margin: 0 0 10px 0; line-height: 1.3; font-weight: 700; }
        
        .ai-summary { display: none; background: var(--ai-bg); padding: 12px; border-radius: 12px; margin: 8px 0; font-size: 0.9rem; line-height: 1.5; color: var(--text-color); border-left: 4px solid var(--accent-color); }
        .ai-btn { background: none; border: 1.5px solid var(--accent-color); color: var(--accent-color); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; align-self: flex-start; margin-top: 4px; }
        .news-link { text-decoration: none; color: var(--accent-color); font-weight: 700; font-size: 0.8rem; align-self: flex-end; margin-top: 8px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--modal-bg); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; }

        .skeleton { background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-color) 50%, var(--border-color) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 10px; min-height: 100px; margin-bottom: 12px;}
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <h1 class="logo" translate="no">News</h1>
            <div class="header-right">
                <div class="currency-block notranslate" onclick="openChartModal()" translate="no">
                    <span id="rates">$ --.- € --.-</span>
                </div>
                <div class="header-btns">
                    <button class="icon-btn" onclick="forceRefresh()" title="Обновить">
                        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                    <button class="icon-btn" onclick="toggleTheme()" id="t-icon">🌙</button>
                </div>
            </div>
        </div>
        
        <div class="tabs-container" translate="no">
            <div class="tabs">
                <div class="tabs-row">
                    <button class="tab-btn active" onclick="loadNews('WORLD', this)">В мире</button>
                    <button class="tab-btn" onclick="loadNews('SCIENCE', this)">Наука</button>
                    <button class="tab-btn" onclick="loadNews('POLITICS', this)">Политика</button>
                </div>
                <div class="tabs-row">
                    <button class="tab-btn" onclick="loadNews('BUSINESS', this)">Экономика</button>
                    <button class="tab-btn" onclick="loadNews('TECHNOLOGY', this)">Технологии</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="news-grid"></div>
    </main>

    <div class="modal-overlay" id="chartModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 translate="no" style="margin:0 0 15px 0; font-size: 1rem; text-align: center;">Курс валют ЦБ (7 дней)</h3>
            <canvas id="currencyChart"></canvas>
        </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <script>
        // --- PWA BLOB (ФИКС START_URL) ---
        // Если сайт открыт в Safari/Chrome, нажми "Поделиться" -> "На экран Домой", чтобы убрать строку адреса.
        const manifest = { 
            "name": "Global News AI", 
            "short_name": "News AI", 
            "start_url": "index.html", 
            "display": "standalone", 
            "background_color": "#000000", 
            "theme_color": "#000000", 
            "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/3615/3615127.png", "sizes": "512x512", "type": "image/png" }] 
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        const GEMINI_KEY = "REPLACE_WITH_GEMINI_KEY"; 
        const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent";
        let chartInstance = null;
        let currentTopic = 'WORLD';
        const vibe = (u = false) => { try { if(navigator.vibrate && u) navigator.vibrate(40); } catch(e) {} };

        // --- AI АНАЛИЗ ---
        async function getAISummary(cardId, articleUrl, rssDesc) {
            vibe(true);
            const card = document.getElementById(cardId);
            const btn = card.querySelector('.ai-btn');
            const box = card.querySelector('.ai-summary');
            btn.innerText = "Читаю..."; btn.classList.add('loading');

            try {
                const pUrl = `https://corsproxy.io/?${encodeURIComponent(articleUrl)}`;
                const res = await fetch(pUrl);
                const html = await res.text();
                if (html.includes("Cloudflare")) throw new Error("Blocked");

                const doc = new DOMParser().parseFromString(html, "text/html");
                let text = Array.from(doc.querySelectorAll('article p, p')).map(p => p.innerText.trim()).filter(t => t.length > 50).join(' ').substring(0, 7000);
                if (text.length < 300) throw new Error("Short");

                btn.innerText = "Анализ...";
                await callGemini(btn, box, text, "Сделай подробный пересказ новости на русском (2-3 предложения):");
            } catch (e) {
                const title = card.querySelector('.news-title').innerText;
                await callGemini(btn, box, `${title}. ${rssDesc}`, "Кратко перескажи новость на русском:");
            }
        }

        async function callGemini(btn, box, content, prompt) {
            try {
                const res = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `${prompt} ${content}` }] }] })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                if (data.candidates && data.candidates[0].content) {
                    box.innerText = data.candidates[0].content.parts[0].text.trim();
                    box.style.display = "block"; btn.style.display = "none";
                }
            } catch (err) {
                console.error("AI Error:", err);
                btn.classList.remove('loading');
                btn.innerText = err.message.includes("quota") ? "Лимит исчерпан" : "Ошибка анализа";
                setTimeout(() => { if(btn.style.display !== "none") btn.innerText = "✨ AI Пересказ"; }, 4000);
            }
        }

        // --- ВАЛЮТЫ (ФИКС ПЕРЕВОДЧИКА) ---
        async function fetchRates() {
            try {
                const res = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                const d = await res.json();
                const ratesEl = document.getElementById('rates');
                // Используем текстовые узлы, чтобы переводчик не видел структуры для замены
                ratesEl.innerHTML = `<span class="notranslate" style="color:#34c759">$ ${d.Valute.USD.Value.toFixed(1)}</span> <span class="notranslate" style="color:#ff3b30">€ ${d.Valute.EUR.Value.toFixed(1)}</span>`;
            } catch (e) {}
        }

        async function openChartModal() {
            vibe(true); document.getElementById('chartModal').style.display = 'flex';
            if (chartInstance) chartInstance.destroy();
            const dates = [], usd = [], eur = [];
            let url = 'https://www.cbr-xml-daily.ru/daily_json.js';
            try {
                for (let i = 0; i < 7; i++) {
                    const r = await fetch(url); const d = await r.json();
                    dates.unshift(new Date(d.Date).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}));
                    usd.unshift(d.Valute.USD.Value); eur.unshift(d.Valute.EUR.Value);
                    url = 'https:' + d.PreviousURL;
                }
                chartInstance = new Chart(document.getElementById('currencyChart').getContext('2d'), {
                    type: 'line', data: { labels: dates, datasets: [{ label: 'USD', data: usd, borderColor: '#34c759', tension: 0.3 }, { label: 'EUR', data: eur, borderColor: '#ff3b30', tension: 0.3 }] },
                    options: { responsive: true, plugins: { legend: { labels: { color: '#888' } } }, scales: { x: { ticks: { color: '#888' } }, y: { ticks: { color: '#888' } } } }
                });
            } catch (e) {}
        }

        async function loadNews(topic, btn) {
            if(btn) vibe(true); currentTopic = topic;
            if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const cached = localStorage.getItem('nCache_' + topic);
            if (cached) { const p = JSON.parse(cached); if (Date.now() - p.t < 900000) { render(p.d, topic, p.t); return; } }
            document.getElementById('news-grid').innerHTML = Array(3).fill(0).map(() => `<div class="skeleton"></div>`).join('');
            try {
                const rssMap = { WORLD: 'news/world', SCIENCE: 'news/science_and_environment', POLITICS: 'news/politics', BUSINESS: 'news/business', TECHNOLOGY: 'news/technology' };
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://feeds.bbci.co.uk/${rssMap[topic]}/rss.xml`)}`);
                const data = await res.json();
                if(data.status === 'ok') { localStorage.setItem('nCache_' + topic, JSON.stringify({d: data.items.slice(0,10), t: Date.now()})); render(data.items.slice(0,10), topic, Date.now()); }
            } catch (e) { document.getElementById('news-grid').innerHTML = 'Ошибка сети.'; }
        }

        function render(items, src, ts) {
            const timeAgo = Math.floor((Date.now() - ts) / 60000);
            document.getElementById('news-grid').innerHTML = items.map((item, i) => {
                const cardId = `news-${Math.random().toString(36).substr(2, 9)}`;
                const cleanDesc = (item.description || "").replace(/<[^>]*>/g, '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `
                <div class="news-card ${i === 0 ? 'top-story' : ''}" id="${cardId}">
                    <div class="news-source" translate="no">BBC ${src}</div>
                    <div class="news-date" translate="no">${new Date(item.pubDate).toLocaleString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'})} <span style="opacity:0.5">⏱ ${timeAgo < 1 ? 'только что' : timeAgo + ' мин'}</span></div>
                    <h3 class="news-title">${item.title}</h3>
                    <div class="ai-summary"></div>
                    <button class="ai-btn" translate="no" onclick="getAISummary('${cardId}', '${item.link}', '${cleanDesc}')">✨ AI Пересказ</button>
                    <a href="${item.link}" target="_blank" class="news-link" translate="no">Оригинал ↗</a>
                </div>`;
            }).join('');
        }

        function forceRefresh() { localStorage.removeItem('nCache_' + currentTopic); loadNews(currentTopic, document.querySelector('.tab-btn.active')); }
        function toggleTheme() { vibe(true); document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); document.getElementById('t-icon').textContent = document.body.classList.contains('dark-mode') ? '🌙' : '☀️'; }
        
        document.cookie = "googtrans=/en/ru; path=/;";
        window.googleTranslateElementInit = () => { new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'ru', autoDisplay: false }, 'google_translate_element'); };
        
        window.onload = () => { 
            if(localStorage.getItem('theme') === 'light') toggleTheme();
            fetchRates(); loadNews('WORLD'); 
        };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
