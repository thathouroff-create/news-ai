<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3615/3615127.png">
    <title>Global News</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* БЛОКИРОВКА UI GOOGLE */
        .skiptranslate, .goog-te-banner-frame, #goog-gt-tt, .goog-te-spinner-pos, .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { 
            display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; 
        }
        body { top: 0 !important; position: relative !important; margin: 0 !important; padding: 0 !important; }
        html { margin-top: 0 !important; }

        :root {
            --bg-color: #f4f6f8; --text-color: #1d1d1f; --text-muted: #86868b;
            --card-bg: #ffffff; --header-bg: #ffffff; --accent-color: #0066cc;
            --border-color: #d2d2d7; --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --ai-bg: rgba(0, 102, 204, 0.05);
        }

        body.dark-mode {
            --bg-color: #000000; --text-color: #f5f5f7; --text-muted: #86868b;
            --card-bg: #1c1c1e; --header-bg: #1c1c1e; --accent-color: #2997ff;
            --border-color: #38383a; --shadow: 0 4px 12px rgba(0,0,0,0.5);
            --ai-bg: rgba(41, 151, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s; -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--header-bg); border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100; padding-top: env(safe-area-inset-top);
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; max-width: 1200px; margin: 0 auto;
        }

        .logo { margin: 0; font-size: 1.7rem; font-weight: 900; color: var(--accent-color); letter-spacing: -1px; }

        .header-controls { display: flex; gap: 8px; align-items: center; }

        .currency-block {
            display: flex; align-items: center; background: var(--card-bg); 
            border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 700; cursor: pointer; box-shadow: var(--shadow);
        }

        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color);
            border-radius: 10px; width: 38px; height: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);
        }
        
        .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* Меню 3+2 */
        .tabs-container { width: 100%; border-top: 1px solid var(--border-color); padding: 12px 0; background-color: var(--header-bg); }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; padding: 0 15px; max-width: 360px; margin: 0 auto; gap: 8px; }

        .tab-btn {
            background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); 
            border-radius: 20px; padding: 7px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: #ffffff; border-color: var(--accent-color); }

        .container { max-width: 800px; margin: 15px auto; padding: 0 15px; min-height: 50vh; }

        /* Карточки */
        .news-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 18px; padding: 18px; margin-bottom: 15px; box-shadow: var(--shadow); display: flex; flex-direction: column;
        }
        .news-card.top-story { border: 2px solid var(--accent-color); }
        .news-source { display: inline-block; background: rgba(128, 128, 128, 0.15); color: var(--text-color); padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; align-self: flex-start; }
        .news-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .news-title { font-size: 1.15rem; margin: 0 0 10px 0; line-height: 1.3; font-weight: 700; }
        
        /* AI Summary */
        .ai-summary { 
            display: none; background: var(--ai-bg); padding: 14px; border-radius: 12px; 
            margin: 10px 0; font-size: 0.92rem; line-height: 1.5; color: var(--text-color);
            border-left: 4px solid var(--accent-color); font-style: italic;
        }

        .ai-btn {
            background: none; border: 1.5px solid var(--accent-color); color: var(--accent-color);
            padding: 7px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; margin-top: 5px; align-self: flex-start; transition: 0.2s;
        }
        .ai-btn.loading { opacity: 0.5; pointer-events: none; }

        .news-link { text-decoration: none; color: var(--accent-color); font-weight: 700; font-size: 0.85rem; align-self: flex-end; margin-top: 10px; }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-color) 50%, var(--border-color) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 10px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="dark-mode">

    <header>
        <div class="header-top">
            <h1 class="logo" translate="no">News</h1>
            <div class="header-controls" translate="no">
                <div class="currency-block" onclick="openChartModal()">
                    <span id="rates">$-- | €--</span>
                </div>
                <button class="icon-btn" onclick="forceRefresh()" title="Обновить">
                    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
                <button class="icon-btn" onclick="toggleTheme()" id="t-icon">🌙</button>
            </div>
        </div>
        <div class="tabs-container" translate="no">
            <div class="tabs">
                <button class="tab-btn active" onclick="loadNews('WORLD', this)">В мире</button>
                <button class="tab-btn" onclick="loadNews('SCIENCE', this)">Наука</button>
                <button class="tab-btn" onclick="loadNews('POLITICS', this)">Политика</button>
                <button class="tab-btn" onclick="loadNews('BUSINESS', this)">Экономика</button>
                <button class="tab-btn" onclick="loadNews('TECHNOLOGY', this)">Технологии</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="news-grid"></div>
    </main>

    <div id="google_translate_element" style="display:none;"></div>

    <script>
        // Сброс старого кэша при обновлении до версии 7.0
        if (localStorage.getItem('v_reset') !== '7.0') {
            localStorage.clear();
            localStorage.setItem('v_reset', '7.0');
        }

        const HF_TOKEN = "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";
        const HF_MODEL = "sshleifer/distilbart-cnn-12-6";
        const CACHE_TTL = 15 * 60 * 1000; 

        const FEEDS = {
            WORLD: { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC World' },
            SCIENCE: { url: 'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml', name: 'BBC Science' },
            POLITICS: { url: 'https://feeds.bbci.co.uk/news/politics/rss.xml', name: 'BBC Politics' },
            BUSINESS: { url: 'https://feeds.bbci.co.uk/news/business/rss.xml', name: 'BBC Business' },
            TECHNOLOGY: { url: 'https://feeds.bbci.co.uk/news/technology/rss.xml', name: 'BBC Tech' }
        };

        const vibe = () => { try { if(navigator.vibrate) navigator.vibrate(40); } catch(e) {} };

        // --- ИСПРАВЛЕННЫЙ ВЫЗОВ AI ---
        async function getAISummary(text, btnId, boxId) {
            vibe();
            const btn = document.getElementById(btnId);
            const box = document.getElementById(boxId);
            btn.innerText = "Думаю...";
            btn.classList.add('loading');

            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
                    headers: { 
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({ 
                        inputs: text.substring(0, 1000),
                        options: { wait_for_model: true } // Это заставит API подождать, если модель спит
                    }),
                });
                
                const result = await response.json();
                
                if (Array.isArray(result) && result[0].summary_text) {
                    box.innerText = result[0].summary_text;
                    box.style.display = "block";
                    btn.style.display = "none";
                } else if (result.error) {
                    // Если модель загружается, Hugging Face пришлет время ожидания
                    if (result.estimated_time) {
                        btn.innerText = `Загрузка AI (${Math.round(result.estimated_time)}с)...`;
                        setTimeout(() => getAISummary(text, btnId, boxId), 5000);
                    } else {
                        throw new Error(result.error);
                    }
                } else {
                    throw new Error("API Unknown Response");
                }
            } catch (e) {
                console.error("AI Error:", e);
                btn.innerText = "AI временно занят";
                setTimeout(() => { btn.innerText = "✨ AI Пересказ"; btn.classList.remove('loading'); }, 3000);
            }
        }

        function showSkeletons() {
            document.getElementById('news-grid').innerHTML = Array(4).fill(0).map(() => `
                <div class="news-card"><div class="skeleton" style="width:60px;height:12px;margin-bottom:10px;"></div><div class="skeleton" style="width:90%;height:20px;margin-bottom:10px;"></div><div class="skeleton" style="width:100%;height:40px;"></div></div>
            `).join('');
        }

        // Бронебойный фетчер (уже проверен на GitHub Pages)
        async function fetchRSS(topic) {
            const url = FEEDS[topic].url;
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if (data.status === 'ok') return data.items.slice(0, 10);
                throw new Error();
            } catch (e) {
                const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                const res = await fetch(proxy);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                return Array.from(xml.querySelectorAll("item")).slice(0, 10).map(i => ({
                    title: i.querySelector("title")?.textContent || "",
                    link: i.querySelector("link")?.textContent || "",
                    pubDate: i.querySelector("pubDate")?.textContent || "",
                    description: i.querySelector("description")?.textContent || ""
                }));
            }
        }

        async function loadNews(topic, btn) {
            if(btn) vibe(); 
            currentTopic = topic;
            if(btn) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

            const cached = localStorage.getItem('nCache_' + topic);
            if (cached) {
                const p = JSON.parse(cached);
                if (Date.now() - p.t < CACHE_TTL) { render(p.d, FEEDS[topic].name, p.t); return; }
            }

            showSkeletons();
            try {
                const items = await fetchRSS(topic);
                localStorage.setItem('nCache_' + topic, JSON.stringify({d: items, t: Date.now()}));
                render(items, FEEDS[topic].name, Date.now());
            } catch (e) {
                document.getElementById('news-grid').innerHTML = '<div style="text-align:center; padding:40px; color:red;">Ошибка сети. Нажмите 🔄</div>';
            }
        }

        function render(items, source, ts) {
            const grid = document.getElementById('news-grid');
            const timeAgo = Math.floor((Date.now() - ts) / 60000);
            const timeStr = timeAgo < 1 ? 'только что' : `${timeAgo} мин. назад`;
            
            grid.innerHTML = items.map((item, i) => {
                const cleanText = (item.description || "").replace(/<[^>]*>/g, '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const aiBtnId = `ai-btn-${Math.random().toString(36).substr(2, 9)}`;
                const aiBoxId = `ai-box-${Math.random().toString(36).substr(2, 9)}`;

                return `
                <div class="news-card ${i === 0 ? 'top-story' : ''}">
                    ${i === 0 ? '<div class="top-story-badge" translate="no">ГЛАВНОЕ</div>' : ''}
                    <div class="news-source" translate="no">${source}</div>
                    <div class="news-date" translate="no">${new Date(item.pubDate).toLocaleString('ru-RU', {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'})} <span style="opacity:0.5">⏱ ${timeStr}</span></div>
                    <h3 class="news-title">${item.title}</h3>
                    <div id="${aiBoxId}" class="ai-summary"></div>
                    <button id="${aiBtnId}" class="ai-btn" translate="no" onclick="getAISummary('${cleanText}', '${aiBtnId}', '${aiBoxId}')">✨ AI Пересказ</button>
                    <a href="${item.link}" target="_blank" class="news-link" translate="no">Оригинал ↗</a>
                </div>`;
            }).join('');
        }

        function forceRefresh() { vibe(); localStorage.removeItem('nCache_' + currentTopic); loadNews(currentTopic, document.querySelector('.tab-btn.active')); }

        function toggleTheme() {
            vibe(); document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('t-icon').textContent = isDark ? '🌙' : '☀️';
        }

        async function fetchRates() {
            try {
                const res = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                const data = await res.json();
                document.getElementById('rates').innerHTML = `<span style="color:#34c759">$ ${data.Valute.USD.Value.toFixed(1)}</span> <span style="color:#ff3b30">€ ${data.Valute.EUR.Value.toFixed(1)}</span>`;
            } catch (e) {}
        }

        document.cookie = "googtrans=/en/ru; path=/;";
        window.googleTranslateElementInit = () => { new google.translate.TranslateElement({ pageLanguage: 'en', includedLanguages: 'ru', autoDisplay: false }, 'google_translate_element'); };
        
        window.onload = () => { 
            if(localStorage.getItem('theme') === 'light') { document.body.classList.remove('dark-mode'); document.getElementById('t-icon').textContent = '☀️'; }
            fetchRates(); loadNews('WORLD'); 
        };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
